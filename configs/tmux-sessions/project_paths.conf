# tmux-sessionizer search roots — one directory per line.
#
# Each line's immediate subdirectories are treated as repos, and each
# repo's .claude/worktrees/* entries are treated as worktrees.
#
# Rules:
#   - blank lines and text after '#' are ignored
#   - a leading '~' expands to your home directory
#   - override this file's location with $TMUX_SESSIONIZER_PATHS
#
# This is the DEFAULT/fallback list, used when the current tmux session has no
# <session>/project_paths.conf (see bunjang/, pp/, hs/, chabis/).

~/Workspace/bunjang/git
~/Workspace/pp/git
~/Workspace/hs/git
~/Workspace/chabis/git
