set -g allow-passthrough on
set-window-option -g mode-keys vi

# --- sane defaults ---
set -sg escape-time 10                          # 1. fast ESC (no vim mode-switch lag)
set -g mouse on                                 # 2. scroll / click pane / drag resize+select
set -g history-limit 50000                      # 3. larger scrollback (default 2000 too small)
set -g default-terminal "tmux-256color"         # 4. true color
set -as terminal-features ",xterm-256color:RGB" #    matches outer terminal $TERM
set -g set-clipboard on                         # 5. (SSH only) push clipboard to local via OSC 52

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# --- vim-tmux-navigator: seamless C-h/j/k/l between nvim splits and tmux panes ---
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\' 'select-pane -l'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# clear screen + scrollback, moved off C-k -> prefix (C-Space) + k
bind 'k' send-keys C-l \; clear-history

unbind '"'
bind 'v' split-window -v -c "#{pane_current_path}"
unbind '%'
bind 'h' split-window -h -c "#{pane_current_path}"
bind -n 'C-t' split-window -v -l 20 -c "#{pane_current_path}"

# --- prefix-pending indicator: flip the WHOLE status bar (high visibility) ---
# tmux redraws the status line on every prefix toggle, so this updates live.
set -g status-left-length 40
set -g status-style '#{?client_prefix,bg=colour94 fg=colour231,bg=colour236 fg=colour250}'
set -g status-left ' #S '
# --- window tabs: highlight the current window by color instead of the * flag ---
set -g window-status-style 'fg=colour245'
set -g window-status-format ' #I:#W '
# inverted while prefix is pending, otherwise the tab would vanish into the
# colour94 bar set by status-style above
set -g window-status-current-style '#{?client_prefix,bg=colour231 fg=colour94,bg=colour94 fg=colour231},bold'
set -g window-status-current-format ' #I:#W '
# Static pane border colors. tmux does NOT redraw pane borders on a prefix
# toggle, so a #{client_prefix} conditional here can never update live.
set -g pane-active-border-style fg=green
set -g pane-border-style fg=colour240

bind r source-file ~/.tmux.conf

# --- plugins (TPM) ---  prefix + I install / prefix + U update / prefix + alt-u clean
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'   # widely-agreed sane defaults
set -g @plugin 'tmux-plugins/tmux-yank'       # copy to system clipboard (auto-detects pbcopy)
set -g @plugin 'tmux-plugins/tmux-resurrect'  # save/restore sessions, windows, panes
set -g @plugin 'tmux-plugins/tmux-continuum'  # automate resurrect: auto-save + auto-restore

# resurrect / continuum behavior
set -g @continuum-restore 'on'                # restore last saved environment on tmux start
set -g @continuum-save-interval '15'          # auto-save every 15 minutes
set -g @resurrect-capture-pane-contents 'on'  # also restore each pane's visible output

# Initialize TPM — keep this as the LAST line of tmux.conf
run '~/.tmux/plugins/tpm/tpm'

